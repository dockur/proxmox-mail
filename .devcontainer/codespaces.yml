services:
  proxmox:
    hostname: pve
    image: dockurr/proxmox
    container_name: proxmox
    environment:
      PASSWORD: "root"
    ports:
      - 8006:8006
    volumes:
      - ./storage:/var/lib/vz
      - ./config:/var/lib/pve-cluster
    privileged: true
    restart: on-failure
    stop_grace_period: 2m
