services:
  pdm:
    hostname: pdm
    container_name: pdm
    image: dockurr/proxmox-dm
    environment:
      PASSWORD: "root"
    ports:
      - 8443:8443
    volumes:
      - ./pdm:/var/lib/pdm
      - ./config:/etc/proxmox-datacenter-manager
      - ./data:/var/lib/proxmox-datacenter-manager
      - ./logs:/var/logs/proxmox-datacenter-manager
    restart: always
    privileged: true
    stop_grace_period: 2m
